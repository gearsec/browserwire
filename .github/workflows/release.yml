name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci --ignore-scripts

      - name: Set version from tag
        run: npm version "${GITHUB_REF#refs/tags/v}" --no-git-tag-version --allow-same-version

      - name: Build UI
        run: npm run ui:build

      - name: Build Electron app (arm64)
        run: npx electron-forge make --arch=arm64

      - name: Build Electron app (x64)
        run: npx electron-forge make --arch=x64

      - name: Collect DMGs
        id: collect
        run: |
          VERSION="${GITHUB_REF#refs/tags/v}"
          mkdir -p release-assets

          # Find and copy all DMGs
          find out/make -name '*.dmg' -exec cp {} release-assets/ \;

          # Normalize filenames
          cd release-assets
          for f in *.dmg; do
            if echo "$f" | grep -qi arm64; then
              mv "$f" "BrowserWire-${VERSION}-arm64.dmg"
            elif echo "$f" | grep -qi x64; then
              mv "$f" "BrowserWire-${VERSION}-x64.dmg"
            fi
          done

          ls -la

          # Compute SHA256 for Cask update
          echo "sha_arm64=$(shasum -a 256 BrowserWire-${VERSION}-arm64.dmg | cut -d' ' -f1)" >> "$GITHUB_OUTPUT"
          echo "sha_x64=$(shasum -a 256 BrowserWire-${VERSION}-x64.dmg | cut -d' ' -f1)" >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v7
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Update Homebrew Cask
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ steps.collect.outputs.version }}"
          SHA_ARM64="${{ steps.collect.outputs.sha_arm64 }}"
          SHA_X64="${{ steps.collect.outputs.sha_x64 }}"

          sed -i '' \
            -e "s/version \".*\"/version \"${VERSION}\"/" \
            -e "/arm64.dmg/{ n; s/sha256 \".*\"/sha256 \"${SHA_ARM64}\"/; }" \
            -e "/x64.dmg/{ n; s/sha256 \".*\"/sha256 \"${SHA_X64}\"/; }" \
            Casks/browserwire.rb

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Casks/browserwire.rb
          git commit -m "chore: update Homebrew Cask to ${VERSION}"
          git push origin HEAD:main
