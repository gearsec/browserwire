syntax = "proto3";

package browserwire.v1;

// ─── Geometry ────────────────────────────────────────────────────────

message Rect {
  double x = 1;
  double y = 2;
  double width = 3;
  double height = 4;
}

// ─── Skeleton ────────────────────────────────────────────────────────

message SkeletonEntry {
  int32 scan_id = 1;
  string tag = 2;
  string role = 3;
  string name = 4;
  string text = 5;
  bool interactable = 6;
  Rect rect = 7;
  map<string, string> attributes = 8;
  string dom_path = 9;
  string xpath = 10;
  int32 depth = 11;
  int32 parent_scan_id = 12;
  bool visible = 13;
  bool focusable = 14;
}

// ─── Trigger ─────────────────────────────────────────────────────────

message TriggerTarget {
  string tag = 1;
  string text = 2;
  string role = 3;
  string name = 4;
  map<string, string> attributes = 5;
}

message TriggerParentContext {
  string nearest_landmark = 1;
  string nearest_heading = 2;
}

message Trigger {
  string kind = 1;       // "click" | "input" | "navigation" | "initial"
  TriggerTarget target = 2;
  TriggerParentContext parent_context = 3;
  string url = 4;
  string title = 5;
  int64 timestamp = 6;
}

// ─── Network Log ─────────────────────────────────────────────────────

message NetworkLogEntry {
  string method = 1;
  string url = 2;
  int32 status = 3;
  string status_text = 4;
  string content_type = 5;
  map<string, string> query_params = 6;
  bytes request_body = 7;     // UTF-8 JSON
  bytes response_body = 8;    // UTF-8 JSON
  bool body_truncated = 9;
  double duration_ms = 10;
  int64 started_at = 11;
}

// ─── Page State ──────────────────────────────────────────────────────

message PageState {
  string url = 1;
  string title = 2;
  int32 scroll_x = 3;
  int32 scroll_y = 4;
  int32 viewport_width = 5;
  int32 viewport_height = 6;
}
