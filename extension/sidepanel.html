<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>BrowserWire</title>
    <style>
      :root {
        --bg: #f4f1ea;
        --panel: #fffaf0;
        --text: #222;
        --muted: #5f5a4d;
        --ok: #2f7d32;
        --warn: #915f00;
        --err: #b3261e;
        --border: #ded7c8;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font:
          14px/1.4 "Georgia",
          "Times New Roman",
          serif;
        color: var(--text);
        background: radial-gradient(circle at top, #fffaf0 0%, var(--bg) 70%);
      }

      .wrap {
        padding: 14px;
      }

      .card {
        background: var(--panel);
        border: 1px solid var(--border);
        border-radius: 10px;
        padding: 12px;
        box-shadow: 0 5px 14px rgba(0, 0, 0, 0.06);
      }

      h1 {
        margin: 0 0 8px;
        font-size: 16px;
      }

      .row {
        display: flex;
        gap: 8px;
        margin: 10px 0;
      }

      input,
      button {
        font: inherit;
      }

      input {
        width: 100%;
        border: 1px solid var(--border);
        border-radius: 8px;
        padding: 8px;
        background: #fff;
      }

      button {
        border: 1px solid #8f8572;
        background: #ece2cd;
        border-radius: 8px;
        padding: 8px 10px;
        cursor: pointer;
      }

      button.primary {
        background: #2f7d32;
        color: #fff;
        border-color: #256b28;
      }

      button.danger {
        background: #b3261e;
        color: #fff;
        border-color: #8e1e18;
      }

      #sessionNote {
        width: 100%;
        border: 1px solid var(--border);
        border-radius: 8px;
        padding: 8px;
        background: #fff;
        font: inherit;
        font-size: 13px;
        resize: vertical;
        min-height: 48px;
        display: none;
      }

      #sessionNote.visible {
        display: block;
      }

      #backendStatus,
      #sessionStatus {
        margin: 6px 0;
      }

      .ok {
        color: var(--ok);
      }

      .warn {
        color: var(--warn);
      }

      .err {
        color: var(--err);
      }

      .stats {
        margin: 8px 0;
        padding: 8px;
        background: #fff;
        border: 1px solid var(--border);
        border-radius: 8px;
        font-size: 13px;
        display: none;
      }

      .stats.visible {
        display: block;
      }

      .stats .stat-row {
        display: flex;
        justify-content: space-between;
        padding: 2px 0;
      }

      .stats .stat-label {
        color: var(--muted);
      }

      .stats .stat-value {
        font-weight: bold;
      }

      #log {
        margin: 0;
        border: 1px solid var(--border);
        border-radius: 8px;
        padding: 8px;
        height: 200px;
        overflow: auto;
        background: #fff;
        font-family: "Menlo", "Consolas", monospace;
        font-size: 12px;
      }

      #logSection {
        margin: 10px 0 0;
      }

      #logSection summary {
        cursor: pointer;
        font-size: 13px;
        color: var(--muted);
      }

      #apiStatus {
        margin: 8px 0;
        padding: 8px;
        background: #fff;
        border: 1px solid var(--border);
        border-radius: 8px;
        font-size: 13px;
      }

      #apiStatus a {
        color: var(--ok);
        font-weight: bold;
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="card">
        <h1>BrowserWire</h1>
        <label for="wsUrl">Backend URL</label>
        <div class="row">
          <input id="wsUrl" type="text" value="ws://127.0.0.1:8787" />
        </div>
        <div class="row">
          <button id="connect" style="display:none">Connect Backend</button>
          <button id="disconnect" style="display:none">Disconnect Backend</button>
        </div>
        <div class="row">
          <button id="startExploring" class="primary">Start Exploring</button>
          <button id="stopExploring" class="danger">Stop Exploring</button>
        </div>
        <textarea id="sessionNote" placeholder="Optional: describe what you explored..."></textarea>
        <div id="backendStatus" class="warn">Backend: Disconnected</div>
        <div id="sessionStatus" class="warn">Session: Idle</div>
        <div id="siteOrigin" style="display:none; margin:4px 0; font-size:13px; color:var(--muted)"></div>
        <div id="sessionStats" class="stats">
          <div class="stat-row">
            <span class="stat-label">Snapshots</span>
            <span class="stat-value" id="statSnapshots">0</span>
          </div>
        </div>
        <div id="processingStatus" class="stats">
          <div style="font-weight:bold; margin-bottom:4px;">Backend Processing</div>
          <div id="processingList"></div>
        </div>
        <div id="apiStatus">API docs: <a href="http://127.0.0.1:8787/api/docs" target="_blank">http://127.0.0.1:8787/api/docs</a></div>

        <details id="logSection">
          <summary>Logs</summary>
          <pre id="log" aria-live="polite"></pre>
        </details>
      </div>
    </div>

    <script type="module" src="sidepanel.js"></script>
  </body>
</html>
